# Rafter Security — GitHub Actions
#
# Drop this file into .github/workflows/rafter-security.yml
# Scans every push and PR for hardcoded secrets using the Rafter Action.
#
# Exit codes: 0 = clean, 1 = secrets found (blocks merge), 2 = scanner error
# No API key required. No code leaves the runner.
#
# Options:
#   - Uncomment the security-audit job for full SAST/SCA via the Rafter API
#   - Set RAFTER_API_KEY in repo Settings > Secrets if using backend code analysis
#
# Docs: https://docs.rafter.so/cli/ci

name: Rafter Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        uses: raftersecurity/rafter-cli@v0
        with:
          scan-path: '.'

