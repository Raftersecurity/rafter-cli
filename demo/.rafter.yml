version: "1"
risk_level: moderate
command_policy:
  mode: approve-dangerous
  blocked_patterns:
    - "rm -rf /"
    - ":(){ :|:& };:"
    - "dd if=/dev/zero of=/dev/sd"
  require_approval:
    - "npm publish"
    - "git push --force"
    - "sudo rm"
scan:
  exclude_paths:
    - "node_modules/"
    - ".git/"
  custom_patterns:
    - name: "Internal API Key"
      regex: "INTERNAL_[A-Z0-9]{32}"
      severity: critical
audit:
  retention_days: 90
  log_level: info
