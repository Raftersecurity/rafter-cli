<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>trove — secret inventory</title>
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg:               #0f1115;
    --bg-elev:          #161a20;
    --bg-card:          #1a1f26;
    --fg:               #e8edf2;
    --fg-muted:         #8d96a3;
    --rule:             #232a33;
    --pill:             #1f252e;

    --rafter-green:      #2ea44f;
    --rafter-green-deep: #1e7e34;
    --rafter-green-mute: #1f3a2a;

    --warn:   #d9822c;
    --danger: #d6504d;
    --info:   #4a90e2;

    --font-body: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 14px/1.5 var(--font-body);
    color: var(--fg);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    font-feature-settings: "tnum" 1;
  }
  code, .mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1; }

  /* ---------- header ---------- */
  header.top {
    position: sticky; top: 0; z-index: 5;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--rule);
    padding: 0.75em 1.2em;
    display: flex; align-items: center; gap: 1em;
  }
  header.top .wordmark {
    display: flex; align-items: baseline; gap: 0.55em;
  }
  header.top .wordmark .name {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.15;
    color: var(--fg);
  }
  header.top .wordmark .by {
    font-size: 14px;
    color: var(--fg-muted);
    font-weight: 400;
  }
  header.top .wordmark .by .rafter {
    color: var(--fg-muted);
  }
  header.top .spacer { flex: 1; min-width: 0; }
  header.top .actions {
    display: flex; gap: 0.45em; align-items: center;
  }

  /* ---------- drift badge ---------- */
  .drift-badge {
    display: inline-flex; align-items: center; gap: 0.4em;
    background: var(--pill);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 3px 11px 3px 9px;
    font-size: 12px;
    color: var(--fg-muted);
    cursor: help;
  }
  .drift-badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--fg-muted);
  }
  .drift-badge[data-state="connected"] .dot { background: var(--rafter-green); }
  .drift-badge[data-state="connected"] {
    color: var(--fg);
    border-color: color-mix(in srgb, var(--rafter-green) 45%, var(--rule));
  }
  .drift-badge[data-state="connecting"] .dot {
    background: var(--warn);
    animation: pulse 1.1s ease-in-out infinite;
  }
  .drift-badge[data-state="closed"] .dot { background: var(--fg-muted); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  /* ---------- buttons ---------- */
  button, .btn {
    font: inherit;
    background: var(--pill);
    color: var(--fg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 0.35em 0.85em;
    cursor: pointer;
    line-height: 1.2;
  }
  button:hover, .btn:hover {
    background: var(--bg-elev);
    border-color: color-mix(in srgb, var(--rafter-green) 45%, var(--rule));
  }
  button:focus-visible, .btn:focus-visible,
  a:focus-visible, [tabindex="0"]:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--rafter-green);
    outline-offset: 2px;
  }
  button.primary {
    background: var(--rafter-green);
    border-color: var(--rafter-green);
    color: #0a0d11;
    font-weight: 600;
  }
  button.primary:hover {
    background: var(--rafter-green-deep);
    border-color: var(--rafter-green-deep);
  }
  button.warn { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, var(--rule)); }
  button.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, var(--rule)); }
  button.ghost { background: transparent; border-color: transparent; color: var(--fg-muted); }
  button.ghost:hover { color: var(--fg); background: var(--bg-elev); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.icon {
    padding: 0.35em 0.6em;
    color: var(--fg-muted);
  }

  /* ---------- main layout ---------- */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    min-height: 0;
  }
  #list-wrap {
    overflow: auto;
    padding: 1em 1.2em 4em 1.2em;
  }
  #panel-wrap {
    border-left: 1px solid var(--rule);
    background: var(--bg-elev);
    overflow: auto;
    display: none;
  }
  #panel-wrap.open { display: block; }
  @media (max-width: 880px) {
    main { grid-template-columns: minmax(0, 1fr); }
    #panel-wrap {
      position: fixed; left: 0; right: 0; bottom: 0;
      max-height: 70vh; border-left: none; border-top: 1px solid var(--rule);
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.4);
    }
  }

  /* ---------- dashboard tiles ---------- */
  section.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 1.25em;
  }
  .tile {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 14px 16px;
    min-height: 90px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
  }
  .tile:hover {
    border-color: color-mix(in srgb, var(--rafter-green) 50%, var(--rule));
    transform: translateY(-1px);
  }
  .tile[data-tile="files-scanned"]:hover { border-color: color-mix(in srgb, var(--fg) 25%, var(--rule)); }
  .tile .num {
    font-family: var(--font-mono);
    font-feature-settings: "tnum" 1;
    font-size: 36px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--fg);
  }
  .tile .label {
    margin-top: 6px;
    font-size: 12px;
    color: var(--fg-muted);
    line-height: 1.35;
  }
  .tile[data-severity="warn"] .num { color: var(--warn); }
  .tile[data-severity="danger"] .num { color: var(--danger); }
  .tile[data-severity="ok"] .num { color: var(--rafter-green); }
  .tile[data-severity="zero"] .num { color: var(--fg-muted); }
  .tile .tip {
    position: absolute;
    bottom: 6px; right: 8px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--pill);
    color: var(--fg-muted);
    border: 1px solid var(--rule);
    font-size: 10px;
    line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: help;
  }
  .tile .tip:hover::after,
  .tile .tip:focus::after {
    content: attr(data-tip);
    display: block;
    position: absolute;
    bottom: calc(100% + 6px); right: 0;
    background: var(--bg-elev);
    color: var(--fg);
    border: 1px solid var(--rule);
    padding: 0.5em 0.7em;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 12px;
    line-height: 1.4;
    width: 260px;
    text-align: left;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
    z-index: 20;
    white-space: normal;
  }

  /* ---------- sections ---------- */
  details.section {
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 10px;
    margin-bottom: 0.8em;
    overflow: hidden;
  }
  details.section.unsupported { opacity: 0.55; }
  details.section > summary {
    cursor: pointer;
    padding: 0.65em 0.95em;
    list-style: none;
    display: flex; align-items: center; gap: 0.6em;
    user-select: none;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary::before {
    content: "▸"; color: var(--fg-muted);
    width: 1em; text-align: center;
    transition: transform 0.12s ease;
  }
  details.section[open] > summary::before { content: "▾"; }
  details.section .section-title {
    font-size: 14px; font-weight: 500; color: var(--fg);
  }
  details.section .section-subtitle {
    color: var(--fg-muted); font-size: 12px;
  }
  details.section .section-count {
    margin-left: auto;
    background: var(--pill);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 1px 9px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--fg-muted);
  }
  details.section.flashing {
    animation: flash 0.7s ease-out;
  }
  @keyframes flash {
    0% { box-shadow: 0 0 0 2px var(--rafter-green); }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* ---------- file rows ---------- */
  ul.files {
    list-style: none; padding: 0; margin: 0;
    border-top: 1px solid var(--rule);
  }
  li.file-row {
    border-bottom: 1px solid var(--rule);
  }
  li.file-row:last-child { border-bottom: none; }
  .file-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    gap: 0.7em;
    align-items: center;
    padding: 0.55em 0.95em;
    cursor: pointer;
    transition: background 0.12s;
  }
  .file-head:hover {
    background: color-mix(in srgb, var(--rafter-green) 6%, var(--bg-elev));
  }
  li.file-row[data-highlight="danger"] {
    border-left: 3px solid var(--danger);
  }
  li.file-row[data-highlight="warn"] {
    border-left: 3px solid var(--warn);
  }
  li.file-row[data-highlight="danger"] .file-head,
  li.file-row[data-highlight="warn"] .file-head {
    padding-left: calc(0.95em - 3px);
  }
  .file-head .path {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
    direction: rtl;
    text-align: left;
  }
  .file-head .path bdi { direction: ltr; unicode-bidi: bidi-override; }
  .file-head .count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-muted);
    padding: 1px 9px;
    background: var(--pill);
    border: 1px solid var(--rule);
    border-radius: 999px;
    white-space: nowrap;
  }
  .file-head .chips {
    display: flex; gap: 0.4em; flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
  }
  .chip {
    background: var(--pill);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--fg-muted);
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 0.25em;
  }
  .chip.mode-ok    { color: var(--rafter-green); border-color: color-mix(in srgb, var(--rafter-green) 35%, var(--rule)); }
  .chip.mode-warn  { color: var(--warn);  border-color: color-mix(in srgb, var(--warn) 40%, var(--rule)); }
  .chip.mode-danger{ color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, var(--rule)); }
  .chip.in-git     { color: var(--warn);  border-color: color-mix(in srgb, var(--warn) 40%, var(--rule)); }
  .chip.in-history { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, var(--rule)); }
  .chip .mode-help {
    cursor: help;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--pill);
    color: var(--fg-muted);
    border: 1px solid var(--rule);
    font-size: 10px;
    line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: 2px;
    font-family: var(--font-body);
    position: relative;
  }
  .chip .mode-help[data-tip]:hover::after,
  .chip .mode-help[data-tip]:focus::after {
    content: attr(data-tip);
    display: block;
    position: absolute;
    bottom: calc(100% + 6px); right: -4px;
    background: var(--bg-elev);
    color: var(--fg);
    border: 1px solid var(--rule);
    padding: 0.45em 0.6em;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 12px;
    line-height: 1.4;
    width: 240px;
    text-align: left;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
    z-index: 10;
    white-space: normal;
  }
  .chmod-btn {
    background: transparent;
    color: var(--warn);
    border: 1px solid color-mix(in srgb, var(--warn) 45%, var(--rule));
    border-radius: 6px;
    padding: 2px 9px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  .chmod-btn:hover:not(:disabled) {
    background: var(--warn);
    color: #0a0d11;
  }
  .chmod-btn:disabled { opacity: 0.55; cursor: progress; }

  /* expanded file body */
  .file-body {
    display: none;
    border-top: 1px solid var(--rule);
    background: var(--bg);
  }
  li.file-row.expanded .file-body { display: block; }
  li.file-row.expanded > .file-head::before {
    content: "▾";
    color: var(--fg-muted);
    margin-right: 0.4em;
    font-size: 11px;
  }
  li.file-row:not(.expanded) > .file-head::before {
    content: "▸";
    color: var(--fg-muted);
    margin-right: 0.4em;
    font-size: 11px;
  }
  ul.secrets-in-file {
    list-style: none; padding: 0; margin: 0;
  }
  li.secret {
    display: grid;
    grid-template-columns: minmax(120px, 0.9fr) minmax(120px, 1.2fr) auto;
    gap: 0.9em;
    align-items: center;
    padding: 0.45em 1.2em 0.45em 2em;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
  }
  li.secret:last-child { border-bottom: none; }
  li.secret:hover { background: color-mix(in srgb, var(--rafter-green) 5%, var(--bg)); }
  li.secret.selected {
    background: color-mix(in srgb, var(--rafter-green) 9%, var(--bg));
    box-shadow: inset 2px 0 0 var(--rafter-green);
  }
  li.secret.stale { opacity: 0.55; }
  li.secret .key {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  li.secret .preview {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: pointer;
  }
  li.secret .preview.blurred { filter: blur(4px); transition: filter 0.15s; }
  li.secret .preview.blurred:hover { filter: blur(2px); }
  li.secret .preview.revealed {
    color: var(--fg);
    filter: none;
    background: color-mix(in srgb, var(--rafter-green) 14%, transparent);
    border-radius: 4px;
    padding: 0 4px;
  }
  li.secret .meta-right {
    display: flex; align-items: center; gap: 0.5em;
    color: var(--fg-muted);
    font-size: 11px;
    font-family: var(--font-mono);
  }
  li.secret .badge {
    background: var(--pill); border: 1px solid var(--rule); border-radius: 999px;
    padding: 1px 8px; font-size: 11px; color: var(--fg-muted);
    font-family: var(--font-mono);
  }
  li.secret .badge.rotated {
    color: var(--rafter-green);
    border-color: color-mix(in srgb, var(--rafter-green) 40%, var(--rule));
  }

  /* unsupported / coming-soon section body */
  .coming-soon {
    padding: 0.65em 0.95em;
    color: var(--fg-muted);
    font-style: italic;
    font-size: 12px;
    border-top: 1px solid var(--rule);
  }

  /* ---------- detail panel ---------- */
  #panel { padding: 1.1em 1.1em 2em 1.1em; }
  #panel .panel-head {
    display: flex; align-items: flex-start; gap: 0.5em;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 0.6em;
    margin-bottom: 0.6em;
  }
  #panel .panel-head h2 {
    margin: 0; flex: 1;
    font-family: var(--font-mono);
    font-size: 14px; font-weight: 500;
    color: var(--fg);
    word-break: break-all;
  }
  #panel .panel-head .close-panel {
    padding: 0 0.5em;
    background: transparent; border-color: transparent;
    color: var(--fg-muted); font-size: 18px; line-height: 1;
  }
  #panel section { margin: 1.1em 0 0 0; }
  #panel section:first-of-type { margin-top: 0.4em; }
  #panel h3 {
    font-size: 11px; color: var(--fg-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 0 0 0.45em 0; font-weight: 500;
  }
  #panel .panel-preview {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--pill);
    padding: 0.5em 0.65em;
    border-radius: 6px;
    word-break: break-all;
    color: var(--fg-muted);
    filter: blur(4px);
    cursor: pointer;
    user-select: none;
  }
  #panel .panel-preview.revealed {
    color: var(--fg);
    filter: none;
    background: color-mix(in srgb, var(--rafter-green) 14%, var(--pill));
    user-select: text;
  }
  #panel .panel-preview-actions {
    display: flex; gap: 0.4em; margin-top: 0.4em; align-items: center;
  }
  #panel .panel-preview-actions .save-state { font-size: 11px; color: var(--fg-muted); }
  #panel .panel-preview-actions .save-state.saving { color: var(--rafter-green); }
  #panel .panel-preview-actions .save-state.saved { color: var(--rafter-green); }
  #panel .panel-preview-actions .save-state.err { color: var(--danger); }
  #panel dl.meta { margin: 0; }
  #panel dl.meta > div { margin-bottom: 0.55em; }
  #panel dl.meta dt {
    color: var(--fg-muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 0.2em;
  }
  #panel dl.meta dd { margin: 0; }
  #panel dl.meta input, #panel dl.meta textarea {
    width: 100%;
    font: inherit;
    background: var(--pill);
    color: var(--fg);
    border: 1px solid var(--rule);
    border-radius: 5px;
    padding: 0.35em 0.55em;
  }
  #panel dl.meta textarea {
    min-height: 4em; resize: vertical;
    font-family: var(--font-body);
  }
  #panel ul.found-list, #panel ul.history-list { list-style: none; padding: 0; margin: 0; }
  #panel ul.found-list li, #panel ul.history-list li {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--fg-muted);
    margin-bottom: 0.25em;
    word-break: break-all;
  }
  #panel ul.found-list li.unsupported { font-style: italic; }
  #panel .undo-row {
    margin-top: 0.6em; font-size: 12px;
    color: var(--fg-muted);
    display: flex; align-items: center; gap: 0.5em;
  }
  #panel .actions-row {
    display: flex; gap: 0.45em; flex-wrap: wrap;
    margin-top: 0.4em;
  }
  #panel a.rotate-link {
    font-size: 12px;
    color: var(--rafter-green);
  }
  #panel section.audit ul.found-list li { color: var(--danger); }

  /* ---------- mode helper in chip ---------- */
  .mode-help[data-tip]::after { display: none; }

  /* ---------- empty / toast ---------- */
  .empty {
    text-align: center;
    color: var(--fg-muted);
    padding: 4em 1em;
    font-size: 13px;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 10px;
  }
  .empty .empty-lede {
    color: var(--fg);
    font-size: 15px;
    margin-bottom: 0.5em;
  }
  .empty .empty-actions {
    margin-top: 0.9em;
    display: flex; justify-content: center; gap: 0.45em;
  }
  #toast-region {
    position: fixed;
    bottom: 1.2em; left: 50%; transform: translateX(-50%);
    z-index: 50;
    display: flex; flex-direction: column; gap: 0.4em; align-items: center;
    pointer-events: none;
  }
  .toast {
    background: var(--bg-elev);
    color: var(--fg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 0.45em 0.85em;
    font-size: 13px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
    pointer-events: auto;
    max-width: 60ch;
  }
  .toast.err { border-color: color-mix(in srgb, var(--danger) 55%, var(--rule)); color: var(--danger); }
  .toast.ok  { border-color: color-mix(in srgb, var(--rafter-green) 45%, var(--rule)); }
  .toast.drift {
    border-color: color-mix(in srgb, var(--rafter-green) 60%, var(--rule));
    background: color-mix(in srgb, var(--rafter-green-mute) 60%, var(--bg-elev));
  }

  /* ---------- drift ticker (a11y live region, off-screen) ---------- */
  #drift-ticker {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden; clip: rect(0 0 0 0);
  }

  @media (max-width: 600px) {
    header.top { padding: 0.65em 0.85em; }
    header.top .wordmark .name { font-size: 18px; }
    #list-wrap { padding: 0.8em 0.85em 4em 0.85em; }
    section.dashboard { gap: 8px; }
    .tile { min-height: 76px; padding: 10px 12px; }
    .tile .num { font-size: 28px; }
    .file-head { grid-template-columns: minmax(0, 1fr) auto; gap: 0.5em; }
    .file-head .chips { grid-column: 1 / -1; justify-content: flex-start; padding-top: 4px; }
  }
</style>
</head>
<body>
<header class="top" role="banner">
  <div class="wordmark">
    <span class="name">trove</span>
    <span class="by">· by Rafter</span>
  </div>
  <div class="spacer" aria-hidden="true"></div>
  <div class="actions">
    <span id="drift-badge" class="drift-badge" data-state="connecting" tabindex="0"
          data-tip="trove watches your files for value changes. When a secret rotates, you see it here within seconds without re-running a scan."
          aria-label="Drift watcher status">
      <span class="dot" aria-hidden="true"></span>
      <span class="label">Connecting…</span>
    </span>
    <button id="rescan-btn" class="btn" type="button" aria-label="Re-scan now">Re-scan</button>
    <button id="settings-btn" class="btn icon" type="button" aria-label="Settings">⚙</button>
  </div>
</header>

<main>
  <div id="list-wrap">
    <section class="dashboard" id="dashboard" aria-label="Risk dashboard">
      <div class="tile" data-tile="files-scanned" data-severity="zero" tabindex="0" role="button"
           aria-label="Files with secrets">
        <div class="num" data-num="files-scanned">—</div>
        <div class="label">files with secrets</div>
        <span class="tip" tabindex="0"
              data-tip="Distinct files where trove found at least one secret. Hover individual rows for the per-file breakdown."
              aria-label="What does this number mean?">?</span>
      </div>
      <div class="tile" data-tile="loose-perms" data-severity="zero" tabindex="0" role="button"
           aria-label="Files with loose permissions">
        <div class="num" data-num="loose-perms">—</div>
        <div class="label">files with loose perms</div>
        <span class="tip" tabindex="0"
              data-tip="Files whose mode is 0644 / 0640 / 0666 — anything more permissive than 0600. Click the tile to jump to those rows."
              aria-label="What does this number mean?">?</span>
      </div>
      <div class="tile" data-tile="env-in-git" data-severity="zero" tabindex="0" role="button"
           aria-label=".env files in git repos with secrets">
        <div class="num" data-num="env-in-git">—</div>
        <div class="label"><code>.env</code> in git + secrets</div>
        <span class="tip" tabindex="0"
              data-tip="These .env files live inside a git working tree — they can be accidentally committed. Add them to .gitignore."
              aria-label="What does this number mean?">?</span>
      </div>
      <div class="tile" data-tile="total-secrets" data-severity="zero" tabindex="0" role="button"
           aria-label="Total distinct secrets">
        <div class="num" data-num="total-secrets">—</div>
        <div class="label">secrets total</div>
        <span class="tip" tabindex="0"
              data-tip="Distinct secrets after BLAKE3 dedup across all source files."
              aria-label="What does this number mean?">?</span>
      </div>
    </section>

    <div id="list" data-clear-selection></div>
  </div>
  <div id="panel-wrap" aria-label="Secret detail">
    <div id="panel"></div>
  </div>
</main>

<div id="toast-region" aria-live="polite" aria-atomic="false"></div>
<div id="drift-ticker" aria-live="polite" aria-atomic="false"></div>

<script src="/static/app.js"></script>
</body>
</html>
