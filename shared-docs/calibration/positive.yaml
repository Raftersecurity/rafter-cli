# Calibration: POSITIVE corpus
#
# Cases that MUST be detected. Each entry is a prompt and the secrets that
# should be found inside it. The harness asserts:
#   - Each `expects[*].value` appears in detected[*].value (recall).
#   - Optional `expects[*].pattern` is checked if present (so a regex
#     refactor that keeps the value but renames the pattern still passes).
#
# This file is restricted to prompt-shield assignment+phrase forms with
# synthetic values. URL-with-credentials, provider tokens (AWS/GitHub/
# Stripe/...), and quoted Generic-API-Key/Generic-Secret forms live in
# the per-pattern matrix that runs from test code, because:
#   1. Putting literal provider tokens in this fixture would trip rafter's
#      own pretool hook on every Write/Edit.
#   2. Push protection on the GitHub remote rejects pushes containing
#      live-looking provider tokens.
# Test code constructs those values from parts at runtime.
#
# Identifiers used here all contain a non-word char before the credential
# keyword (DB_PASSWORD, MY_API_KEY, …) so they don't accidentally also
# match Generic Secret / Generic API Key — which would inflate detection
# counts on the same value and confuse the per-pattern recall metric.

cases:
  # ─── Inline credential assignment — separator + quoting variations ───
  - id: assignment-equals-bare
    prompt: "Connect with DB_PASSWORD=hunter2andmore please"
    expects:
      - value: hunter2andmore
        pattern: Inline credential assignment

  - id: assignment-equals-double-quoted
    prompt: 'Use DB_PASSWORD="qwerty1234abcd" in the request'
    expects:
      - value: qwerty1234abcd

  - id: assignment-equals-single-quoted
    prompt: "set DB_PASSWORD='abcd1234efgh' in compose"
    expects:
      - value: abcd1234efgh

  - id: assignment-equals-backticked
    prompt: "Run with AUTH_TOKEN=`abc12345defgh` for staging"
    expects:
      - value: abc12345defgh

  - id: assignment-colon-yaml
    prompt: "DB_PASSWORD: hunter2andmore in the yaml"
    expects:
      - value: hunter2andmore

  - id: assignment-colon-spaced
    prompt: "config has ACCESS_KEY : abcd1234efgh in it"
    expects:
      - value: abcd1234efgh

  - id: assignment-equals-spaced
    prompt: "set MY_API_KEY = abcd1234efgh on startup"
    expects:
      - value: abcd1234efgh
        pattern: Inline credential assignment

  # ─── Case variations on the credential keyword ───────────────────────
  - id: assignment-uppercase-keyword
    prompt: "DB_PASSWORD=ZZZ12345aaaaa was the value"
    expects:
      - value: ZZZ12345aaaaa

  - id: assignment-mixedcase-keyword
    prompt: "MyAuthToken=mixed1234CaseValue was used"
    expects:
      - value: mixed1234CaseValue

  - id: assignment-lowercase-snake
    prompt: "my_api_key=abcd1234efgh5678 in env"
    expects:
      - value: abcd1234efgh5678

  # ─── Multiple secrets in one prompt ──────────────────────────────────
  - id: assignment-multiple-secrets
    prompt: "DB_PASSWORD=firstone1234 and MY_API_KEY=secondone1234 both set"
    expects:
      - value: firstone1234
      - value: secondone1234

  # ─── Length boundary: 6 chars (lower bound) — must match ─────────────
  - id: assignment-length-6
    prompt: "DB_PASSWORD=abc123 was set"
    expects:
      - value: abc123

  # ─── Inline credential phrase ────────────────────────────────────────
  - id: phrase-password-is
    prompt: "the password is hunter2andmore for the staging db"
    expects:
      - value: hunter2andmore

  - id: phrase-api-key-is
    prompt: "the api key is abcd1234efgh5678ijkl for the test account"
    expects:
      - value: abcd1234efgh5678ijkl

  - id: phrase-secret-is
    prompt: "the secret is hunter2andmore so do not share"
    expects:
      - value: hunter2andmore

  - id: phrase-token-is
    prompt: "the token is abcd1234efgh5678 for now"
    expects:
      - value: abcd1234efgh5678

  - id: phrase-credential-is-quoted
    prompt: "the credential is \"hunter2andmore\" right now"
    expects:
      - value: hunter2andmore

  - id: phrase-api-dash-key-variant
    prompt: "the api-key is abcd1234efgh5678 currently"
    expects:
      - value: abcd1234efgh5678

  - id: phrase-passwd-variant
    prompt: "the passwd is hunter2andmore now"
    expects:
      - value: hunter2andmore

  - id: phrase-pwd-variant
    prompt: "the pwd is hunter2andmore for the legacy adapter"
    expects:
      - value: hunter2andmore

  - id: phrase-pass-variant
    prompt: "the pass is hunter2andmore for now"
    expects:
      - value: hunter2andmore

  - id: phrase-apikey-no-separator
    prompt: "the apikey is abcd1234efgh5678 for now"
    expects:
      - value: abcd1234efgh5678

  - id: phrase-api-underscore-key
    prompt: "the api_key is abcd1234efgh5678 for now"
    expects:
      - value: abcd1234efgh5678

  - id: phrase-digit-at-end-of-value
    prompt: "the password is hunterabcdef9 for staging"
    expects:
      - value: hunterabcdef9

  - id: phrase-min-length-with-digit
    prompt: "the token is abc1de for now"
    expects:
      - value: abc1de

  # ─── Assignment: keyword variants the corpus did not exercise ────────
  - id: assignment-pwd-variant
    prompt: "DB_PWD=abcd1234efgh for the legacy adapter"
    expects:
      - value: abcd1234efgh

  - id: assignment-credential-variant
    prompt: "MY_CREDENTIAL=abcd1234efgh in the seed config"
    expects:
      - value: abcd1234efgh

  - id: assignment-access-key-variant
    prompt: "MY_ACCESS_KEY=abcd1234efgh in the rotation script"
    expects:
      - value: abcd1234efgh

  - id: assignment-auth-token-variant
    prompt: "MY_AUTH_TOKEN=abcd1234efgh for the staging client"
    expects:
      - value: abcd1234efgh

  - id: assignment-apikey-no-separator
    prompt: "MY_APIKEY=abcd1234efgh in the loader"
    expects:
      - value: abcd1234efgh

  - id: assignment-secret-keyword
    prompt: "MY_SECRET=abcd1234efgh in the seed config"
    expects:
      - value: abcd1234efgh

  # ─── Assignment: keyword position variants ───────────────────────────
  - id: assignment-keyword-prefix
    prompt: "PASSWORD_DB=hunter2andmore is the writer pool secret"
    expects:
      - value: hunter2andmore

  - id: assignment-keyword-middle
    prompt: "DB_PASSWORD_PROD=hunter2andmore in the prod override"
    expects:
      - value: hunter2andmore

  # ─── Assignment: tab separator ───────────────────────────────────────
  - id: assignment-tab-around-equals
    prompt: "DB_PASSWORD\t=\thunter2andmore in the script"
    expects:
      - value: hunter2andmore
        pattern: Inline credential assignment

  # ─── Assignment: position variants ───────────────────────────────────
  - id: assignment-start-of-prompt
    prompt: "DB_PASSWORD=hunter2andmore -- paste this into vault"
    expects:
      - value: hunter2andmore

  - id: assignment-in-parens
    # Adjacent `)` is trimmed off the captured value by the post-match
    # sentence-punctuation strip in detectSecrets.
    prompt: "the writer pool (DB_PASSWORD=hunter2andmore) is correct"
    expects:
      - value: hunter2andmore

  # ─── Real-world paste: multi-line debug context ──────────────────────
  # Devs paste large logs/configs and ask "why isn't this working?"
  # The secret can be far from the actual question.
  - id: paste-multiline-debug-block
    prompt: |
      Hey, debugging a connection issue. Here's the docker-compose snippet
      and staging logs:

      [12:00:01] starting migration runner
      [12:00:02] DB_PASSWORD=hunter2andmore loaded from env
      [12:00:03] connection refused

      Anything obvious?
    expects:
      - value: hunter2andmore

  - id: paste-markdown-fenced-block
    prompt: |
      Here's my config:
      ```yaml
      database:
        DB_PASSWORD: hunter2andmore
      ```
      Why does it not connect?
    expects:
      - value: hunter2andmore

  - id: paste-embedded-json-object
    # JSON-key form `{"db_password": "value"}` — the regex now allows an
    # optional `"` between identifier and separator, so the closing quote
    # of the JSON key no longer blocks the match.
    prompt: 'Posted body: {"db_password": "hunter2andmore"} and got 401'
    expects:
      - value: hunter2andmore

  - id: paste-toml-section
    prompt: |
      In my config.toml:
      [database]
      db_password = "abcd1234efgh"
      Why won't it parse?
    expects:
      - value: abcd1234efgh
        pattern: Inline credential assignment

  - id: paste-dotenv-line-standalone
    prompt: "DB_PASSWORD=hunter2andmore"
    expects:
      - value: hunter2andmore

  # ─── Real-world paste: shell forms ───────────────────────────────────
  - id: paste-shell-export
    prompt: "Run `export DB_PASSWORD=hunter2andmore` before docker compose up"
    expects:
      - value: hunter2andmore

  - id: paste-shell-heredoc
    prompt: |
      Wrote this to .env:
      cat > .env <<EOF
      DB_PASSWORD=hunter2andmore
      MY_API_KEY=abcd1234efgh
      EOF
    expects:
      - value: hunter2andmore
      - value: abcd1234efgh

  - id: paste-docker-run-env-flag
    prompt: |
      This container won't start:
      docker run -e POSTGRES_PASSWORD=dockerpw1234abcd -e POSTGRES_USER=app postgres:15
    expects:
      - value: dockerpw1234abcd

  - id: paste-docker-compose-env-list
    prompt: |
      docker-compose.yml has:
        environment:
          - SMTP_PASSWORD=mailpw1234abcdwxyz
          - SMTP_USER=relay
      and the relay still fails auth
    expects:
      - value: mailpw1234abcdwxyz

  - id: paste-kubectl-from-literal
    # `--from-literal=DB_PASSWORD=…` — when the outer LHS (`from-literal`)
    # fails the credential-keyword gate, the orchestrator now rewinds the
    # search to right after that LHS so the inner DB_PASSWORD assignment
    # is re-attempted instead of being silently consumed.
    prompt: |
      Ran:
      kubectl create secret generic db-creds --from-literal=DB_PASSWORD=k8spw1234abcdwxyz
      but the pod still can't connect
    expects:
      - value: k8spw1234abcdwxyz

  - id: paste-gha-env-block
    prompt: |
      My workflow step:
        env:
          DEPLOY_TOKEN: deploytok1234abcdwxyz
        run: ./deploy.sh
      keeps timing out, why?
    expects:
      - value: deploytok1234abcdwxyz

  # ─── Real-world paste: HTTP / API debug ──────────────────────────────
  - id: paste-x-api-key-header
    # HTTP header `X-API-Key: …` — identifier class now traverses `-`, so
    # the full header name is captured and `x-api-key` matches the
    # credential-keyword gate (api[\s_-]?key).
    prompt: |
      Postman shows my request as:
      GET /v2/orders
      X-API-Key: postman1234abcdwxyz
      and the response is 403
    expects:
      - value: postman1234abcdwxyz

  - id: paste-stack-trace-with-token
    prompt: |
      Getting this on prod:
      ERROR AuthMiddleware - failed to verify token=brokentoken1234abcd reason=expired
      what does this mean?
    expects:
      - value: brokentoken1234abcd

  - id: paste-redis-auth-log
    prompt: |
      redis-cli logs:
      [WARN] AUTH attempt with password=hunter2andmore failed for user app-prod
    expects:
      - value: hunter2andmore

  # ─── Real-world paste: code-comment forms ────────────────────────────
  # Note: identifiers prefixed with `db_` / `app_` so the underscore
  # before the credential keyword breaks Generic Secret's lookbehind —
  # otherwise this fixture file itself would trip the file scanner.
  - id: comment-double-slash
    prompt: '// db_password = "hunter2andmore"  // TODO: move to vault'
    expects:
      - value: hunter2andmore
        pattern: Inline credential assignment

  - id: comment-hash
    prompt: "# my_api_key: abcd1234efgh5678  # delete before commit"
    expects:
      - value: abcd1234efgh5678

  - id: comment-c-block
    prompt: "/* app_secret = 'hunter2andmore' */ // legacy"
    expects:
      - value: hunter2andmore
        pattern: Inline credential assignment

  # ─── Value composition variants ──────────────────────────────────────
  - id: assignment-value-letters-only
    prompt: "DB_PASSWORD=hunterhunterabc was set on prod"
    expects:
      - value: hunterhunterabc

  - id: assignment-value-with-symbols
    prompt: "DB_PASSWORD=p@ss!word#42 was set on prod"
    expects:
      - value: p@ss!word#42

  - id: assignment-value-leading-digit
    prompt: "DB_PASSWORD=9abcdefghij was set on prod"
    expects:
      - value: 9abcdefghij

  - id: assignment-long-value
    # `DEPLOY_KEY` doesn't match CREDENTIAL_KEYWORD_RE (only `api_key` /
    # `access_key` are recognized — bare `key` is too generic). Use
    # DEPLOY_TOKEN to exercise the long-value path through the `token`
    # keyword. The "extend keyword set" question is in rc-qet.
    prompt: "DEPLOY_TOKEN=longvalue1234abcdwxyzlongvalue1234abcdwxyzlongvalue is staging"
    expects:
      - value: longvalue1234abcdwxyzlongvalue1234abcdwxyzlongvalue

  # ─── Multiple secrets with substring overlap ─────────────────────────
  # Replacement sorts longest-first; both must be detected and the
  # shorter must not be replaced inside the longer match.
  - id: shadowing-substring-values
    prompt: "DB_PASSWORD=hunter2andmore_extended and AUTH_TOKEN=hunter2andmore both pasted"
    expects:
      - value: hunter2andmore_extended
      - value: hunter2andmore

  # ─── URL with credentials — non-DB schemes (current corpus had zero) ─
  # postgres/mysql/mongodb URLs trip the file scanner's Database
  # Connection String pattern, so they live in the test-code matrix.
  # Non-DB schemes (redis, amqp, ftp, custom) are safe in the YAML.
  - id: url-creds-redis
    prompt: "connect to redis://admin:hunter2andmore@cache.internal:6379/0"
    expects:
      - value: hunter2andmore
        pattern: URL with credentials

  - id: url-creds-amqp
    prompt: "publish to amqp://svc:abcd1234efgh@rabbit.internal:5672/vhost please"
    expects:
      - value: abcd1234efgh

  - id: url-creds-ftp
    prompt: "ftp://anon:hunter2-and.more@ftp.example.com/pub for archives"
    expects:
      - value: "hunter2-and.more"

  - id: url-creds-ldap
    prompt: "tried ldap://svcacct:hunter2andmore@dc.example.com and it bound"
    expects:
      - value: hunter2andmore

  - id: url-creds-custom-scheme
    prompt: "register myproto://user:p4ssw0rdok@registry.internal/v1 in the catalog"
    expects:
      - value: p4ssw0rdok

  # ─── Phrase: realistic embedded prose with X is Y framing ────────────
  - id: phrase-embedded-in-prose
    prompt: "tried logging in but the password is trailing1234abcd and it just hangs"
    expects:
      - value: trailing1234abcd
        pattern: Inline credential phrase

  # ─── Real secrets that COINCIDE with placeholder shapes ──────────────
  # Both critics flagged isLikelyPlaceholder as too aggressive: it dropped
  # real values whose lowercase form started with "example" or contained
  # "xxx". The filter is now whole-token-anchored. These cases pin the new
  # behavior; they would have been silently swallowed before.
  - id: placeholder-near-miss-example-prefix
    prompt: "DB_PASSWORD=example4Hunter2 was the staging value"
    expects:
      - value: example4Hunter2
        pattern: Inline credential assignment

  - id: placeholder-near-miss-xxx-substring
    prompt: "DB_PASSWORD=Mxxx2024aB is a real password the dev chose"
    expects:
      - value: Mxxx2024aB
        pattern: Inline credential assignment
